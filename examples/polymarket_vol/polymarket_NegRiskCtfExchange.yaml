# Polymarket negriskctfexchange pipeline — no-code YAML config
#
# Indexes the Polymarket Multiple-Choice Leading contract events.
#
# Usage:
#   cd examples/polymarket_vol
#   tiders start polymarket_NegRiskCtfExchange.yaml

project:
  name: polymarket_NegRiskCtfExchange
  description: Indexes the Polymarket Multiple-Choice Leading contract events
  repository: https://github.com/yulesa/tiders/example/
  
provider:
  kind:  sqd # hypersync
  url: "https://portal.sqd.dev/datasets/polygon-mainnet" # ${PROVIDER_URL}
  # bearer_token: ${HYPERSYNC_BEARER_TOKEN}
  
contracts:
  - name: polymarket_NegRiskCtfExchange
    address: 0xC5d563A36AE78145C45a50134d48A1215220f80a
    abi: ./polymarket_NegRiskCtfExchange.abi.json
    chain_id: polygon

table_aliases:
  logs: polymarket_negriskctfexchange_logs

query:
  kind: evm
  from_block: 81053172
  to_block: 81054172 #81054172 #81139570
  logs:
    - address: polymarket_NegRiskCtfExchange.address
      topic0:
        - polymarket_NegRiskCtfExchange.Events.OrderFilled.signature
        - polymarket_NegRiskCtfExchange.Events.OrdersMatched.signature
        - polymarket_NegRiskCtfExchange.Events.TokenRegistered.signature
        - polymarket_NegRiskCtfExchange.Events.OrderCancelled.signature
        - polymarket_NegRiskCtfExchange.Events.FeeCharged.signature
        # - polymarket_NegRiskCtfExchange.Events.NewOperator.signature
        # - polymarket_NegRiskCtfExchange.Events.NewAdmin.signature
        # - polymarket_NegRiskCtfExchange.Events.RemovedAdmin.signature
        # - polymarket_NegRiskCtfExchange.Events.RemovedOperator.signature
      include_blocks: true
  fields:
    log: [log_index, transaction_index, transaction_hash, block_hash, block_number, address, data, topic0, topic1, topic2, topic3]
    block: [number, hash, timestamp]

steps:
  - kind: evm_decode_events
    config:
      input_table: polymarket_negriskctfexchange_logs
      event_signature: polymarket_NegRiskCtfExchange.Events.OrderFilled.signature
      output_table: polymarket_negriskctfexchange_orderfilled
      allow_decode_fail: true
      filter_by_topic0: true

  - kind: evm_decode_events
    config:
      input_table: polymarket_negriskctfexchange_logs
      event_signature: polymarket_NegRiskCtfExchange.Events.OrdersMatched.signature
      output_table: polymarket_negriskctfexchange_ordersmatched
      allow_decode_fail: true
      filter_by_topic0: true

  - kind: evm_decode_events
    config:
      input_table: polymarket_negriskctfexchange_logs
      event_signature: polymarket_NegRiskCtfExchange.Events.TokenRegistered.signature
      output_table: polymarket_negriskctfexchange_tokenregistered
      allow_decode_fail: true
      filter_by_topic0: true

  - kind: evm_decode_events
    config:
      input_table: polymarket_negriskctfexchange_logs
      event_signature: polymarket_NegRiskCtfExchange.Events.OrderCancelled.signature
      output_table: polymarket_negriskctfexchange_ordercancelled
      allow_decode_fail: true
      filter_by_topic0: true

  - kind: evm_decode_events
    config:
      input_table: polymarket_negriskctfexchange_logs
      event_signature: polymarket_NegRiskCtfExchange.Events.FeeCharged.signature
      output_table: polymarket_negriskctfexchange_feecharged
      allow_decode_fail: true
      filter_by_topic0: true

  - kind: join_block_data
    config:
      tables: [
        polymarket_negriskctfexchange_orderfilled,
        polymarket_negriskctfexchange_ordersmatched,
        polymarket_negriskctfexchange_tokenregistered,
        polymarket_negriskctfexchange_ordercancelled,
        # polymarket_negriskctfexchange_feearcharged
      ]
      block_table_name: blocks

  - kind: hex_encode

writer:
  kind: clickhouse
  config:
    host: localhost
    port: 8123
    database: default
    username: default
    password: default
